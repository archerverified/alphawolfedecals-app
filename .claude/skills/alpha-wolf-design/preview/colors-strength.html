<!doctype html>
<!-- @dsCard group="Colors" name="Colors · Strength meter" subtitle="Five-step red→emerald sequence from the signup form." viewport="700x280" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_shell.css">
</head><body>
<div class="card light">
  <div class="eyebrow-zinc">Strength meter palette</div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;">
    <div style="height:36px;border-radius:6px;background:#EF4444;"></div>
    <div style="height:36px;border-radius:6px;background:#F97316;"></div>
    <div style="height:36px;border-radius:6px;background:#EAB308;"></div>
    <div style="height:36px;border-radius:6px;background:#84CC16;"></div>
    <div style="height:36px;border-radius:6px;background:#10B981;"></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;font-family:var(--font-mono);font-size:11px;color:#71717A;">
    <div>Too weak<br>#EF4444</div>
    <div>Weak<br>#F97316</div>
    <div>Okay<br>#EAB308</div>
    <div>Strong<br>#84CC16</div>
    <div>Excellent<br>#10B981</div>
  </div>
  <div style="margin-top:6px;">
    <div style="height:6px;border-radius:3px;background:#E4E4E7;overflow:hidden;">
      <div style="height:100%;width:60%;background:#84CC16;transition:width .3s;"></div>
    </div>
    <div class="caption-light" style="margin-top:6px;">Strong · 12+ chars, 1 letter, 1 number, 1 symbol</div>
  </div>
</div>
</body></html>
