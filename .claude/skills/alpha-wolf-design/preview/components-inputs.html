<!doctype html>
<!-- @dsCard group="Components" name="Components · Form inputs" subtitle="Text, search with helper, select — Wrap Studio sizing." viewport="700x340" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_shell.css">
</head><body>
<div class="card light" style="gap:14px;">
  <div class="eyebrow-zinc">Inputs · text · select · search</div>
  <div class="col" style="gap:6px;">
    <label style="font-size:13px;font-weight:500;color:#27272A;">Project name</label>
    <input value="Garage Cowboy fleet wrap" style="height:36px;width:100%;border-radius:6px;border:1px solid #D4D4D8;padding:0 12px;font-size:14px;color:#18181B;box-shadow:0 1px 2px 0 rgba(0,0,0,.05);box-sizing:border-box;font-family:inherit;outline:none;">
  </div>
  <div class="col" style="gap:6px;">
    <label style="font-size:13px;font-weight:500;color:#27272A;">Search</label>
    <input type="search" placeholder="e.g. 2024 transit 250 high roof" style="height:36px;width:100%;border-radius:6px;border:1px solid #D4D4D8;padding:0 12px;font-size:14px;color:#18181B;box-shadow:0 1px 2px 0 rgba(0,0,0,.05);box-sizing:border-box;font-family:inherit;outline:none;">
    <div style="font-size:11px;color:#71717A;">Typo-tolerant — "transt 250" finds Transit 250.</div>
  </div>
  <div class="col" style="gap:6px;">
    <label style="font-size:13px;font-weight:500;color:#27272A;">Year</label>
    <select style="height:36px;width:100%;border-radius:6px;border:1px solid #D4D4D8;padding:0 12px;font-size:14px;color:#18181B;background:#FFFFFF;box-shadow:0 1px 2px 0 rgba(0,0,0,.05);box-sizing:border-box;font-family:inherit;">
      <option>2024</option>
    </select>
  </div>
</div>
</body></html>
