<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing · Soft shadow elevation" subtitle="Three steps used inside the Wrap Studio app." viewport="700x220" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_shell.css">
</head><body style="background:#FAFAFA;">
<div class="card" style="background:#FAFAFA;color:#18181B;">
  <div class="eyebrow-zinc">Elevation · soft shadow on light</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;padding:6px;">
    <div class="col" style="gap:8px;align-items:center;">
      <div style="width:140px;height:90px;background:#fff;border-radius:8px;box-shadow:0 1px 2px 0 rgb(0 0 0 / 0.05);"></div>
      <div style="font-size:12px;font-weight:500;">shadow-xs</div>
      <div class="caption-light" style="text-align:center;">inputs at rest</div>
    </div>
    <div class="col" style="gap:8px;align-items:center;">
      <div style="width:140px;height:90px;background:#fff;border-radius:12px;box-shadow:0 1px 3px 0 rgb(0 0 0 / 0.08), 0 1px 2px -1px rgb(0 0 0 / 0.05);"></div>
      <div style="font-size:12px;font-weight:500;">shadow-sm</div>
      <div class="caption-light" style="text-align:center;">cards · buttons</div>
    </div>
    <div class="col" style="gap:8px;align-items:center;">
      <div style="width:140px;height:90px;background:#fff;border-radius:12px;box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.10), 0 2px 4px -2px rgb(0 0 0 / 0.05);"></div>
      <div style="font-size:12px;font-weight:500;">shadow-md</div>
      <div class="caption-light" style="text-align:center;">card hover only</div>
    </div>
  </div>
  <div class="caption-light">Light-surface elevation is a Wrap Studio device only. Never used as a hierarchy device — purely a hover affordance.</div>
</div>
</body></html>
