<!doctype html>
<!-- @dsCard group="Colors" name="Colors · Status palette" subtitle="Success, warning, danger — 50 / 200 / 900 tint stack." viewport="700x210" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_shell.css">
</head><body>
<div class="card light">
  <div class="eyebrow-zinc">Status · success · warning · danger</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
    <div style="border-radius:8px;border:1px solid #A7F3D0;background:#ECFDF5;padding:14px;">
      <div style="color:#064E3B;font-weight:600;font-size:13px;">Saved</div>
      <div style="color:#065F46;font-size:12px;margin-top:4px;">Autosave fired 3s ago.</div>
    </div>
    <div style="border-radius:8px;border:1px solid #FDE68A;background:#FFFBEB;padding:14px;">
      <div style="color:#78350F;font-weight:600;font-size:13px;">Don't see your vehicle?</div>
      <div style="color:#92400E;font-size:12px;margin-top:4px;">Request it — we'll email you.</div>
    </div>
    <div style="border-radius:8px;border:1px solid #FECACA;background:#FEF2F2;padding:14px;">
      <div style="color:#7F1D1D;font-weight:600;font-size:13px;">Save failed</div>
      <div style="color:#991B1B;font-size:12px;margin-top:4px;">Retry to push the latest revision.</div>
    </div>
  </div>
  <div class="caption-light">Tinted backgrounds = 50; borders = 200; text = 900. Used inside the app; the marketing site rarely shows status states inline.</div>
</div>
</body></html>
