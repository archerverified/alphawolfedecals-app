<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing · Cyan-glow elevation" subtitle="The marketing-card hover device." viewport="700x230" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_shell.css">
</head><body>
<div class="card dark">
  <div class="eyebrow-blue">Elevation · cyan glow on dark</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
    <div style="background:#000000;border:1px solid #1A1A1A;border-radius:8px;padding:20px;">
      <div style="font-weight:600;font-size:14px;">Card at rest</div>
      <div class="caption-dark" style="margin-top:4px;">1px <code class="mono">neutral-900</code> border + soft black shadow</div>
    </div>
    <div style="background:#000000;border:1px solid rgba(0,174,239,0.6);border-radius:8px;padding:20px;box-shadow:0 0 0 1px rgba(0,174,239,0.2), 0 24px 48px -24px rgba(0,174,239,0.45);transform:translateY(-2px);">
      <div style="font-weight:600;font-size:14px;color:#00AEEF;">Card on hover</div>
      <div class="caption-dark" style="margin-top:4px;">Border → blue/60 · ring + cyan drop-shadow · lift -4px</div>
    </div>
  </div>
  <div class="caption-dark">The whole-card hover lift is the marketing site's signature interaction. Use sparingly — only on linked surfaces; never on info cards.</div>
</div>
</body></html>
