<!doctype html>

<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">

</head><body>
<div class="card dark">
  <div class="eyebrow-blue">Brand · core marks</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;">
    <div class="sw"><div class="sw-fill" style="background:#00AEEF;"></div><div class="sw-name">--awd-blue</div><div class="sw-hex">#00AEEF</div></div>
    <div class="sw"><div class="sw-fill" style="background:radial-gradient(50% 50% at 50% 50%, rgba(0,174,239,0.32) 0%, rgba(0,174,239,0) 100%),#0A0A0A;border:1px solid #1A1A1A;"></div><div class="sw-name">--awd-blue-glow</div><div class="sw-hex">rgba blue 32%</div></div>
