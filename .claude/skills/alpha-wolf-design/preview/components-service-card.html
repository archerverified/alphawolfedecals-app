<!doctype html>
<!-- @dsCard group="Components" name="Components · Service card" subtitle="Marketing home service tile with bespoke SVG art." viewport="700x540" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_shell.css">
</head><body>
<div class="card dark">
  <div class="eyebrow-blue">Service card · real install (gallery)</div>
  <a style="display:flex;flex-direction:column;border-radius:8px;border:1px solid #1A1A1A;background:#000000;overflow:hidden;text-decoration:none;color:inherit;transition:transform .25s, border-color .25s, box-shadow .25s;cursor:pointer;"
     onmouseover="this.style.transform='translateY(-4px)';this.style.borderColor='rgba(0,174,239,0.6)';this.style.boxShadow='0 0 0 1px rgba(0,174,239,0.2), 0 24px 48px -24px rgba(0,174,239,0.45)';"
     onmouseout="this.style.transform='';this.style.borderColor='#1A1A1A';this.style.boxShadow='';">

    <!-- Real wrapped-vehicle photo from the shop's gallery -->
    <div style="position:relative;aspect-ratio:4/3;overflow:hidden;background:#000000;">
      <img src="../assets/gallery/14.jpg" alt="Vinyl wrap finish detail — shop install" 
           style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;">
      <!-- Bottom-edge fade into the card body -->
      <div style="position:absolute;left:0;right:0;bottom:0;height:72px;background:linear-gradient(to bottom, transparent 0%, #000000 100%);pointer-events:none;"></div>
    </div>

    <div style="display:flex;flex-direction:column;gap:8px;padding:20px;">
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.22em;color:#00AEEF;">Personal</div>
      <div style="font-size:22px;font-weight:600;color:#FFFFFF;letter-spacing:-0.01em;line-height:1.15;">Vinyl Wraps</div>
      <div style="font-size:13px;color:#9CA3AF;line-height:1.5;">Full-vehicle wraps in any finish — gloss, satin, matte, chrome — installed in our Salem bay.</div>
      <div style="font-size:13px;font-weight:600;color:#00AEEF;margin-top:8px;">Explore →</div>
    </div>
  </a>
</div>
</body></html>
