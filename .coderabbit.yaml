# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit configuration for Alpha Wolf Wrap Studio.
#
# Purpose: encode the hard-won, load-bearing invariants from ADR-0013
# (deploy-infrastructure contract) and the PRD security/privacy posture as
# automated review guardrails, so a future PR that silently unwinds one of them
# gets flagged before it reaches a human reviewer or re-breaks production.
#
# Source of truth for every path rule below:
#   - docs/adr/0013-deploy-infrastructure-contract.md (deploy invariants 1/2/3a/3b/3c)
#   - docs/adr/0012-production-deployment-architecture.md (Phase 1 topology)
#   - docs/adr/0002 (RLS session-variable pattern, referenced by packages/db)
#   - prd.md §8.2 (data storage & privacy) and §10.20 (auth & session hardening)
#
# When you intentionally change one of these invariants, amend the referenced
# ADR/PRD section in the SAME PR — that is what turns a flag into an approval.

language: "en-US"

reviews:
  # CHILL globally: surface real risks, don't nitpick. (handoff TASK 3)
  profile: chill
  high_level_summary: true
  # Keep PRs quiet: no poem, collapse the walkthrough so docs-only PRs aren't noisy.
  poem: false
  collapse_walkthrough: true

  # Skip generated / vendored / baseline artifacts from review.
  path_filters:
    - "!**/pnpm-lock.yaml"
    - "!**/*.lock"
    - "!**/dist/**"
    - "!**/.next/**"
    - "!docs/deployment/lighthouse-baseline-*.html"
    - "!docs/deployment/screenshots/**"

  path_instructions:
    # ── Deploy infrastructure (ADR-0013) ──────────────────────────────────────
    - path: "packages/db/prisma/schema.prisma"
      instructions: >-
        Load-bearing for the production deploy (ADR-0013 Invariant 3c). The
        `generator client` `binaryTargets` array MUST contain all three of
        `native`, `rhel-openssl-3.0.x` (Vercel serverless / Amazon Linux 2023,
        OpenSSL 3), and `debian-openssl-3.0.x` (Render / Debian 12, OpenSSL 3).
        Flag as a blocking concern any change that removes any of these three
        targets unless the same PR amends
        docs/adr/0013-deploy-infrastructure-contract.md. Dropping a target ships
        a Prisma client missing that runtime's query engine binary and crashes
        with `PrismaClientInitializationError: couldn't find a query engine
        binary` at runtime.
    - path: "apps/web/next.config.ts"
      instructions: >-
        Encodes ADR-0013 Invariants 2, 3a, and 3b for the Vercel build. Flag any
        change that removes or weakens: (a) `outputFileTracingRoot` pointing at
        the monorepo root via `path.join(__dirname, '../..')` (Invariant 3a) —
        without it Vercel's nft only traces apps/web/node_modules and misses
        externals reached through pnpm's `.pnpm/` symlink store; (b) the webpack
        `config.resolve.extensionAlias` block mapping `.js` -> `.ts`/`.tsx`
        (Invariant 2) — without it webpack cannot resolve the NodeNext `.js`
        relative-import convention used across the workspace; (c) any entry in
        `serverExternalPackages` (Invariant 3b). Any such removal must amend
        docs/adr/0013-deploy-infrastructure-contract.md and re-verify both deploy
        targets.
    - path: "apps/web/package.json"
      instructions: >-
        Per ADR-0013 Invariant 3b this manifest deliberately lists transitive
        externals as DIRECT dependencies even though apps/web source never
        imports them: svgo, svgson, @node-rs/argon2, bullmq, ioredis, replicate,
        @sentry/profiling-node, @prisma/client, sharp. They are hoisted so pnpm
        symlinks them into apps/web/node_modules where Vercel nft can trace them.
        Flag as blocking any change that removes any of these from
        `dependencies` unless the same PR amends
        docs/adr/0013-deploy-infrastructure-contract.md — removal silently
        re-breaks the Vercel lambda with a runtime `Cannot find module`. Also
        flag version-range skew: each hoisted external must stay in sync with the
        workspace package that actually consumes it (Invariant 3b "negative"
        consequence).
    - path: "render.yaml"
      instructions: >-
        Per ADR-0013 (Render build contract) and the PR #76 cleanup, every Node
        service `buildCommand` must delegate to the root package.json scripts:
        `pnpm render:install` plus `pnpm render:build:api` or
        `pnpm render:build:parse`. Flag any change that reintroduces an inline,
        multi-line build or install command chain in this file instead of calling
        those root scripts — inline chains drift out of sync with the monorepo
        install/build recipe and were a repeated source of deploy breakage.
    # ── Security-sensitive: auth (PRD §10.20) ─────────────────────────────────
    - path: "packages/auth/src/csrf*.ts"
      instructions: >-
        Security-sensitive — implements PRD §10.20 (CSRF tokens on all
        state-changing routes). Review thoroughly: verify tokens are generated
        with a CSPRNG, compared in constant time, bound to the session, and that
        no state-changing route is silently exempted. Do not approve any change
        that weakens or bypasses the CSRF check.
    - path: "packages/auth/src/password.ts"
      instructions: >-
        Security-sensitive — password hashing/verification (PRD §10.20, §8.2).
        Review thoroughly: confirm hashing uses @node-rs/argon2 with sane
        parameters (no downgrade to a weaker algorithm or reduced cost),
        verification is constant-time, and no plaintext password or full hash is
        ever logged or returned in a response. Flag any such regression.
    - path: "packages/auth/src/otp.ts"
      instructions: >-
        Security-sensitive — one-time codes for email verification (PRD §10.1,
        §10.20). Review thoroughly: OTPs must be generated with a CSPRNG, have a
        bounded expiry, be compared in constant time, be rate-limited (PRD §10.1:
        5 sends per email per hour), and never be logged. Flag predictable code
        generation, missing expiry, or missing send rate limits.
    # ── Security-sensitive: RLS data boundary (PRD §8.2, ADR-0002) ────────────
    - path: "packages/db/prisma/sql/auth_rls.sql"
      instructions: >-
        RLS policy source (ADR-0002; PRD §8.2 requires cross-account/cross-shop
        row visibility be impossible at the query layer). Review thoroughly:
        every policy must read `current_setting('app.current_user_id', true)::uuid`
        with the trailing `true` so it fails CLOSED (NULL -> no rows) when the
        session variable is unset. Flag any new table left without an RLS policy,
        any policy using `USING (true)`, any grant to `app_user` beyond
        least-privilege, and confirm `app_user` stays `nobypassrls`.
    - path: "packages/db/src/client.ts"
      instructions: >-
        Request-scoped Prisma client and the RLS enforcement boundary (ADR-0002).
        Review the `withUser` vs `withSystem` distinction carefully: `withUser`
        runs on the non-superuser app_user connection (DATABASE_URL_APP) so RLS
        enforces per-user row scoping, while `withSystem` uses the privileged
        connection that BYPASSES RLS and is only for unauthenticated bootstrap
        paths (signup/login). Flag any new use of `withSystem` on an
        authenticated or user-data path, any query that should run inside
        `withUser` but does not, and any path that sets `app.current_user_id`
        from untrusted input.
    # ── Security-sensitive: edge middleware (PRD §8.2/§10.20) ─────────────────
    - path: "apps/web/middleware.ts"
      instructions: >-
        Security-sensitive edge middleware: it sets the security headers (CSP,
        HSTS, X-Frame-Options, X-Content-Type-Options) and the @upstash/ratelimit
        rate limiter (PRD §8.2, §10.20). Review thoroughly: flag any CSP
        weakening (new `'unsafe-*'` directives, broad `*` sources, or added
        external origins) without justification; flag removal or loosening of
        HSTS or frame-deny; and flag any change that lets the rate limiter fail
        OPEN silently or removes rate limiting from state-changing/auth routes
        (PRD §10.20: 5 failed logins per IP per 15 minutes).

  tools:
    # Secret scanning on every PR.
    gitleaks:
      enabled: true

chat:
  # Don't auto-reply to every comment; keeps the bot quiet unless addressed.
  auto_reply: false
