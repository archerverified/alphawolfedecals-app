# Render deployment configuration — Alpha Wolf Wrap Studio (Phase 1)
# https://render.com/docs/yaml-spec
#
# Three services, all in Oregon (us-west) to align with Supabase (aws-1-us-west-1)
# and Upstash Redis (aws-us-west-2). See ADR-0012.
#
# SECRETS: env vars with sync: false must be set manually in the Render dashboard
# (Dashboard → Service → Environment). Never commit real values here.
#
# BUILD NOTE (pnpm monorepo): Render's managed Node environment ships npm and Node.
# We install pnpm via corepack in the build command. All three Node services build
# from the monorepo root so workspace dependencies resolve correctly.
#
# INKSCAPE NOTE: inkscape and pdf2svg are NOT installed in this Phase 1 config.
# The parse service degrades gracefully: AI/EPS/PDF uploads get
# parse_status='queued_missing_cli' rather than failing. PNG/JPEG/SVG and rembg
# all work. Phase 4 will migrate to a Docker-based service with inkscape pre-installed.

services:
  # ---------------------------------------------------------------------------
  # alphawolf-api — REST API service
  # ---------------------------------------------------------------------------
  - type: web
    name: alphawolf-api
    env: node
    region: oregon
    plan: free
    # `--prod=false` overrides NODE_ENV=production at install time so pnpm
    # installs devDependencies (typescript, tsx, @types/*, vitest). These are
    # required to compile TypeScript at build time. NODE_ENV=production still
    # applies at RUNTIME via the envVars block below — so Sentry's instrument.ts
    # and Express both still see NODE_ENV=production correctly.
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile --prod=false &&
      pnpm --filter @alphawolf/db prisma:generate &&
      pnpm --filter @alphawolf/api build
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_APP
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: PII_ENCRYPTION_KEY
        sync: false
      - key: AUTH_SECRET
        sync: false

  # ---------------------------------------------------------------------------
  # alphawolf-parse — Asset parse BullMQ worker
  #
  # Primary function: consume jobs from Upstash Redis via BullMQ.
  # Secondary: Express HTTP server on $PORT — serves /health for Render's
  # health-check ping AND keeps the service awake on Render's free tier.
  #
  # NOTE: type=web (not worker) is required for Render's free plan, which
  # does NOT support Background Worker services. The existing services/parse
  # code already runs the Express server + BullMQ worker in a single process,
  # so a web service is a clean fit. Trade-off: free-tier web services spin
  # down after 15 min idle — during a cold-start, queued parse jobs sit in
  # Upstash until the first HTTP request wakes the service (or the Render
  # platform pings /health). For the Phase 1 demo this is acceptable.
  # Phase 4 should upgrade to Starter ($7/mo) for always-on or migrate
  # to a real Background Worker on a paid plan.
  # ---------------------------------------------------------------------------
  - type: web
    name: alphawolf-parse
    env: node
    region: oregon
    plan: free
    healthCheckPath: /health
    # See alphawolf-api notes — `--prod=false` is required so typescript/tsx
    # are installed for the build step. NODE_ENV=production still applies at
    # runtime via the envVars block below.
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile --prod=false &&
      pnpm --filter @alphawolf/db prisma:generate &&
      pnpm --filter @alphawolf/parse build
    startCommand: node services/parse/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_APP
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: PII_ENCRYPTION_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false

  # ---------------------------------------------------------------------------
  # alphawolf-ai — Python FastAPI AI service
  #
  # Managed by uv (pyproject.toml at services/ai/). rootDir scopes the build
  # and start commands to the services/ai directory.
  # Phase 1: only PostHog analytics + /health. AI generation is Phase 2.
  # ---------------------------------------------------------------------------
  - type: web
    name: alphawolf-ai
    env: python
    # Python version is read from services/ai/pyproject.toml (`requires-python = ">=3.12"`)
    # by `uv sync` during build. The `pythonVersion` top-level field does NOT exist in
    # Render's Blueprint spec (validator rejects it). If we ever need to override the
    # uv-resolved version, set PYTHON_VERSION as an env var instead.
    region: oregon
    plan: free
    rootDir: services/ai
    buildCommand: pip install uv && uv sync
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: POSTHOG_API_KEY
        sync: false
      - key: POSTHOG_HOST
        # US cloud: https://us.i.posthog.com
        # EU cloud: https://eu.i.posthog.com
        value: https://us.i.posthog.com
