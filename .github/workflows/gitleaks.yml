# Secret scanning — ported from .coderabbit.yaml's `tools.gitleaks` when CodeRabbit
# was retired (2026-06-09; see ADR-0014). Runs on every PR + push to main so a
# committed secret is caught even though the AI reviewer that used to run gitleaks
# is gone.
name: gitleaks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
