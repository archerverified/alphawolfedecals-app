name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # License gate (Goal 2a). The ProVehicleOutlines .ai inputs and their derived
  # SVG/PDF outputs under apps/web/public/vehicle-templates/test-only/ are
  # license-restricted (PVO EULA forbids derivative works for unlicensed catalog
  # use — spec §5.3). They are gitignored, but a `git add -f` or a stale clone
  # could still land them. This job FAILS the build if any such file is tracked,
  # codifying the boundary so a future contributor can't accidentally leak it.
  license-guard:
    name: Guard — no license-restricted template inputs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Reject committed test-only template inputs
        run: |
          tracked="$(git ls-files 'apps/web/public/vehicle-templates/test-only/')"
          if [ -n "$tracked" ]; then
            echo "::error::License-restricted template inputs are committed to the repo:"
            echo "$tracked"
            echo "These files are gitignored for a reason (PVO EULA — spec §5.3)."
            echo "Remove them with: git rm -r --cached apps/web/public/vehicle-templates/test-only/"
            exit 1
          fi
          echo "OK — no license-restricted test-only inputs are tracked."

  node:
    name: Node — lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The Prisma schema lives at packages/db/prisma (a non-default path), so
      # @prisma/client's postinstall can't find it and ships only the stub
      # client. Generate explicitly here, otherwise typecheck fails against the
      # rich Prisma namespace (Prisma.LogLevel, PrismaClientKnownRequestError, …).
      - name: Generate Prisma client
        run: pnpm --filter @alphawolf/db exec prisma generate

      - name: Lint
        run: pnpm turbo run lint

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Test
        run: pnpm turbo run test

  python:
    name: Python — lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service: [ai, paneling]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: 'latest'

      - name: Setup Python
        run: uv python install 3.12

      - name: Sync deps
        working-directory: services/${{ matrix.service }}
        run: uv sync --frozen

      - name: Ruff (lint + format check)
        working-directory: services/${{ matrix.service }}
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Test
        working-directory: services/${{ matrix.service }}
        run: uv run pytest -q
